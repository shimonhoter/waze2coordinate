name: Build APK

on:
  push:
    branches: [ main ]
    # מריץ build רק אם השתנו קבצים שרלוונטיים לאפליקציה -
    # שינויים ב-README, תיעוד וכו' לא יגרמו ל-build מיותר
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Cache ל-Gradle: שומר את ה-dependencies וה-build cache בין הרצות,
      # כך שרק הקבצים שהשתנו בפועל מתורגמים מחדש - לא כל הפרויקט מאפס בכל push
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # build incremental: Gradle עצמו מדלג על משימות שלא הושפעו מהשינוי (up-to-date checks),
      # והקאש ממקסם את זה גם בין runs נפרדים ב-CI
      - name: Build debug APK
        run: ./gradlew assembleDebug --build-cache

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: waze2coordinate-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
